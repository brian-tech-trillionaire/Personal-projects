<!doctype html>
<html lang="en">
  <head>
    <title>Rock-Paper-Scissors-game</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <button
      class="rock"
      onclick="
        const random = Math.random();
        let computerMove = '';

        if (random >= 0 && random <= 1 / 3) {
          computerMove = '✊';
        } else if (random >= 1 / 3 && random < 2 / 3) {
          computerMove = '✋';
        } else {
          computerMove = '✌️';
        }

        let result = '';
        if (computerMove === '✊') {
          result = `You tie`;
        } else if (computerMove === '✋') {
          result = `You lose.`;
        } else {
          result = `You win.`;
        }
        alert(`${result}.You picked Rock. Computer Picked  ${computerMove}`);
      "
    >
      ROCK
    </button>

    <button
      class="paper"
      onclick="
        random = Math.random();
        computerMove = '';

        if (random >= 0 && random <= 1 / 3) {
          computerMove = '✊';
        } else if (random >= 1 / 3 && random < 2 / 3) {
          computerMove = '✋';
        } else {
          computerMove = '✌️';
        }

        result = '';
        if (computerMove === '✊') {
          result = `You win.`;
        } else if (computerMove === '✋') {
          result = `You tie.`;
        } else {
          result = `You lose.`;
        }

        alert(`${result}.You picked Paper. Computer Picked  ${computerMove}`);
      "
    >
      PAPER
    </button>

    <button
      class="scissors"
      onclick="
        random = Math.random();
        computerMove = '';

        if (random >= 0 && random <= 1 / 3) {
          computerMove = '✊';
        } else if (random >= 1 / 3 && random < 2 / 3) {
          computerMove = '✋';
        } else {
          computerMove = '✌️';
        }

        result = '';
        if (computerMove === '✊') {
          result = `You lose.`;
        } else if (computerMove === '✋') {
          result = `You win.`;
        } else {
          result = `You tie.`;
        }

        alert(
          `${result}.You picked Scissors. Computer Picked  ${computerMove}`,
        );
      "
    >
      SCISSORS
    </button>
  </body>
</html>
